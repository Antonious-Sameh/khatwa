<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Decorative circle accent -->
  <circle cx="420" cy="92" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="90" cy="430" r="80" fill="rgba(255,255,255,0.05)"/>
  <!-- "K" letter stylized -->
  <text x="256" y="300" font-family="Arial Black, sans-serif" font-size="240" font-weight="900"
        text-anchor="middle" fill="url(#inner)" opacity="0.95">خ</text>
  <!-- Bottom step dots -->
  <circle cx="170" cy="400" r="18" fill="rgba(255,255,255,0.4)"/>
  <circle cx="230" cy="415" r="14" fill="rgba(255,255,255,0.3)"/>
  <circle cx="285" cy="405" r="18" fill="rgba(255,255,255,0.4)"/>
  <circle cx="342" cy="420" r="14" fill="rgba(255,255,255,0.3)"/>
</svg>