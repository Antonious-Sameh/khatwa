<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (gold/dark — matches app) -->
    <meta name="theme-color" content="#080d1a" />
    <meta name="background-color" content="#080d1a" />

    <!-- App info -->
    <meta name="application-name" content="خطوة" />
    <meta name="description" content="منصة خطوة التعليمية — دراسات اجتماعية وتاريخ" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="خطوة" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32"   href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16"   href="/icons/icon-16x16.png" />
    <link rel="icon" type="image/png" sizes="96x96"   href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="shortcut icon"                          href="/icons/icon-96x96.png" />

    <!-- Windows/Edge -->
    <meta name="msapplication-TileColor" content="#080d1a" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-config"    content="none" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="منصة خطوة التعليمية" />
    <meta property="og:description" content="منصة خطوة التعليمية — دراسات اجتماعية وتاريخ" />
    <meta property="og:image"       content="/icons/icon-512x512.png" />

    <!-- Preconnect to backend for faster API -->
    <link rel="preconnect" href="https://api.khatwaplus.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.khatwaplus.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <title>خطوة — منصة تعليمية</title>

    <!-- Critical: prevent FOUC on dark background -->
    <style>
      html, body { background-color: #080d1a; margin: 0; padding: 0; }
      #root { min-height: 100vh; }
      /* Loading spinner shown before React mounts */
      #app-loader {
        position: fixed; inset: 0; background: #080d1a;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-ring {
        width: 44px; height: 44px;
        border: 3px solid rgba(212,175,55,0.15);
        border-top-color: #D4AF37;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash loader — يختفي بعد ما React يتحمل -->
    <div id="app-loader">
      <div class="loader-ring"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide loader after first render + register SW -->
    <script>
      // Hide the splash loader once React renders
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('app-loader');
        if (!loader) return;
        // Give React 200ms to mount, then fade out
        const hide = () => { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 400); };
        setTimeout(hide, 200);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              // Check for updates every 30 minutes
              setInterval(() => reg.update(), 30 * 60 * 1000);

              // When a new SW is waiting, tell it to activate immediately
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version ready — force activate without waiting
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(() => {}); // Fail silently — app works without SW

          // When SW sends ASSET_NOT_FOUND → stale cache after deploy → clear and reload
          navigator.serviceWorker.addEventListener('message', (e) => {
            if (e.data?.type === 'ASSET_NOT_FOUND') {
              console.warn('[PWA] Stale asset detected:', e.data.url, '— clearing cache and reloading');
              if ('caches' in window) {
                caches.keys()
                  .then(keys => Promise.all(keys.map(k => caches.delete(k))))
                  .then(() => window.location.reload());
              } else {
                window.location.reload();
              }
            }
            if (e.data?.type === 'SW_UPDATED') {
              console.info('[PWA] New service worker activated, version:', e.data.version);
            }
          });

          // When SW activates (new version), reload once to flush stale assets
          //let refreshing = false;
          //navigator.serviceWorker.addEventListener('controllerchange', () => {
            //if (!refreshing) { refreshing = true; window.location.reload(); }
          //});
        });
      }
    </script>
  </body>
</html>
